templates_path: ${templates_path}
envs_path: ${envs_path}
env_templates: []
service_templates: []
envs:
  - template: default
    factory: docker-compose
    tag: multi-gated-demo
    services:
      - tag: web
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        upstreams: []
        containers:
          - tag: nginx
            image: nginx:1.27-alpine
            hostname: web
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports:
              - 8088:80
            networks:
              - default
            extra_hosts: []
            build: null
            inits: null
        start: null
        status:
          active: true
          rendered_config: null
      - tag: cache
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        upstreams: []
        containers:
          - tag: redis
            image: redis:7-alpine
            hostname: cache
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports: []
            networks:
              - default
            extra_hosts: []
            build: null
            inits: null
        start:
          when_probes:
            - warmup
        status:
          active: true
          rendered_config: null
      - tag: frontend
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        upstreams: []
        containers:
          - tag: nginx
            image: nginx:1.27-alpine
            hostname: frontend
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports: []
            networks:
              - default
            extra_hosts: []
            build: null
            inits: null
        start:
          when_probes:
            - warmup
            - cache-ready
        status:
          active: true
          rendered_config: null
      - tag: jobs
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        upstreams: []
        containers:
          - tag: httpd
            image: httpd:2.4-alpine
            hostname: jobs
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports: []
            networks:
              - default
            extra_hosts: []
            build: null
            inits: null
        start:
          when_probes:
            - warmup
            - cache-ready
            - frontend-live
        status:
          active: true
          rendered_config: null
    probes:
      - tag: warmup
        container:
          tag: warmup
          image: busybox:1.36
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - default
          extra_hosts: []
          build: null
          inits: null
        script: sh -lc 'echo waiting gate-1; sleep 2; exit 0'
        script_path: null
      - tag: cache-ready
        container:
          tag: cache-ready
          image: redis:7-alpine
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - default
          extra_hosts: []
          build: null
          inits: null
        script: sh -lc 'redis-cli -h cache ping | grep -q PONG'
        script_path: null
      - tag: frontend-live
        container:
          tag: frontend-live
          image: busybox:1.36
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - default
          extra_hosts: []
          build: null
          inits: null
        script: sh -lc 'sleep 2; wget -q -O- http://frontend >/dev/null 2>&1'
        script_path: null
    networks:
      - tag: default
        name: null
        external: false
        driver: bridge
        attachable: true
        enable_ipv6: false
        driver_opts: null
        ipam: null
    volumes: []
    ready:
      when_probes:
        - warmup
        - cache-ready
        - frontend-live
    status:
      active: true
      rendered_config: null
