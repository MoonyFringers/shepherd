shpd_registry:
  ftp_server: ${shpd_registry}
  ftp_user: ${shpd_registry_ftp_usr}
  ftp_psw: ${shpd_registry_ftp_psw}
  ftp_shpd_path: ${shpd_registry_ftp_shpd_path}
  ftp_env_imgs_path: ${shpd_registry_ftp_imgs_path}
templates_path: ${templates_path}
envs_path: ${envs_path}
volumes_path: ${volumes_path}
host_inet_ip: ${host_inet_ip}
domain: ${domain}
dns_type: ${dns_type}
ca:
  country: ${ca_country}
  state: ${ca_state}
  locality: ${ca_locality}
  organization: ${ca_org}
  organizational_unit: ${ca_org_unit}
  common_name: ${ca_cn}
  email: ${ca_email}
  passphrase: ${ca_passphrase}
cert:
  country: ${cert_country}
  state: ${cert_state}
  locality: ${cert_locality}
  organization: ${cert_org}
  organizational_unit: ${cert_org_unit}
  common_name: ${cert_cn}
  email: ${cert_email}
  subject_alternative_names: []
staging_area:
  volumes_path: ${staging_area_volumes_path}
  images_path: ${staging_area_images_path}
env_templates: []
service_templates: []
envs:
  - template: default
    factory: docker-compose
    tag: multi-gated-demo
    services:
      - tag: web
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        empty_env: null
        ingress: false
        upstreams: []
        containers:
          - tag: nginx
            image: nginx:1.27-alpine
            hostname: web
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports:
              - 8088:80
            networks:
              - default
            extra_hosts: []
            subject_alternative_name: null
            build: null
            inits: null
        start: null
        status:
          active: true
          archived: false
          rendered_config: null
      - tag: cache
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        empty_env: null
        ingress: false
        upstreams: []
        containers:
          - tag: redis
            image: redis:7-alpine
            hostname: cache
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports: []
            networks:
              - default
            extra_hosts: []
            subject_alternative_name: null
            build: null
            inits: null
        start:
          when_probes:
            - warmup
        status:
          active: true
          archived: false
          rendered_config: null
      - tag: frontend
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        empty_env: null
        ingress: false
        upstreams: []
        containers:
          - tag: nginx
            image: nginx:1.27-alpine
            hostname: frontend
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports: []
            networks:
              - default
            extra_hosts: []
            subject_alternative_name: null
            build: null
            inits: null
        start:
          when_probes:
            - warmup
            - cache-ready
        status:
          active: true
          archived: false
          rendered_config: null
      - tag: jobs
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        empty_env: null
        ingress: false
        upstreams: []
        containers:
          - tag: httpd
            image: httpd:2.4-alpine
            hostname: jobs
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports: []
            networks:
              - default
            extra_hosts: []
            subject_alternative_name: null
            build: null
            inits: null
        start:
          when_probes:
            - warmup
            - cache-ready
            - frontend-live
        status:
          active: true
          archived: false
          rendered_config: null
    probes:
      - tag: warmup
        container:
          tag: warmup
          image: busybox:1.36
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - default
          extra_hosts: []
          subject_alternative_name: null
          build: null
          inits: null
        script: sh -lc 'echo waiting gate-1; sleep 2; exit 0'
        script_path: null
      - tag: cache-ready
        container:
          tag: cache-ready
          image: redis:7-alpine
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - default
          extra_hosts: []
          subject_alternative_name: null
          build: null
          inits: null
        script: sh -lc 'redis-cli -h cache ping | grep -q PONG'
        script_path: null
      - tag: frontend-live
        container:
          tag: frontend-live
          image: busybox:1.36
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - default
          extra_hosts: []
          subject_alternative_name: null
          build: null
          inits: null
        script: sh -lc 'sleep 2; wget -q -O- http://frontend >/dev/null 2>&1'
        script_path: null
    networks:
      - tag: default
        name: null
        external: false
        driver: bridge
        attachable: true
        enable_ipv6: false
        driver_opts: null
        ipam: null
    volumes: []
    ready:
      when_probes:
        - warmup
        - cache-ready
        - frontend-live
    status:
      active: true
      archived: false
      rendered_config: null
