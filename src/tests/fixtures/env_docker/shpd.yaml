templates_path: ${templates_path}
envs_path: ${envs_path}
envs:
  - template: default
    factory: docker-compose
    tag: test-1
    services:
      - template: default
        factory: docker
        tag: test-1
        start: null
        containers:
          - image: busybox:stable-glibc
            tag: container-1
            workdir: /test
            volumes:
              - /home/test/.ssh:/home/test/.ssh
              - /etc/ssh:/etc/ssh
            environment: []
            ports:
              - 80:80
              - 443:443
              - 8080:8080
            networks:
              - default
            extra_hosts:
              - host.docker.internal:host-gateway
            inits: null
        labels:
          - com.example.label1=value1
          - com.example.label2=value2
          - domain=sslip.io
        properties: {}
        status:
          active: true
          rendered_config: null
      - template: default
        factory: docker
        tag: test-2
        start: null
        containers:
          - image: busybox:stable-glibc
            tag: container-1
            workdir: /test
            volumes:
              - /home/test/.ssh:/home/test/.ssh
              - /etc/ssh:/etc/ssh
            environment: []
            ports:
              - 80:80
              - 443:443
              - 8080:8080
            networks:
              - default
            extra_hosts:
              - host.docker.internal:host-gateway
            inits: null
        labels:
          - com.example.label1=value1
          - com.example.label2=value2
        properties: {}
        status:
          active: true
          rendered_config: null
    probes:
      - tag: db-ready
        container:
          tag: db-ready
          image: postgres:17-3.5
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - "#{env.tag}"
          extra_hosts: []
          build: null
          inits: null
        script: sh -c 'pg_isready -h db -p 5432 -U sys -d docker'
        script_path: null
      - tag: db-live
        container:
          tag: db-live
          image: postgres:17-3.5
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - "#{env.tag}"
          extra_hosts: []
          build: null
          inits: null
        script: sh -c 'pg_isready -h db -p 5432 -U docker -d docker'
        script_path: null
    networks:
      - tag: default
        name: envnet
        external: true
    volumes:
      - tag: app_data_ext
        external: true
        name: nfs-1
    status:
      active: true
      rendered_config: null
  - template: default
    factory: docker-compose
    tag: test-2
    services:
      - template: default
        factory: docker
        tag: test-1
        start: null
        containers:
          - image: busybox:stable-glibc
            tag: container-1
            workdir: /test
            volumes:
              - /home/test/.ssh:/home/test/.ssh
              - /etc/ssh:/etc/ssh
            environment: []
            ports:
              - 80:80
              - 443:443
              - 8080:8080
            networks:
              - internal_net
            extra_hosts:
              - host.docker.internal:host-gateway
            inits: null
        labels:
          - com.example.label1=value1
          - com.example.label2=value2
        properties: {}
        status:
          active: true
          rendered_config: null
      - template: default
        factory: docker
        tag: test-2
        start: null
        containers:
          - image: busybox:stable-glibc
            tag: container-1
            workdir: /test
            volumes:
              - /home/test/.ssh:/home/test/.ssh
              - /etc/ssh:/etc/ssh
            environment: []
            ports:
              - 80:80
              - 443:443
              - 8080:8080
            networks:
              - internal_net
            extra_hosts:
              - host.docker.internal:host-gateway
            inits: null
        labels:
          - com.example.label1=value1
          - com.example.label2=value2
        properties: {}
        status:
          active: true
          rendered_config: null
    probes: []
    networks:
      - tag: internal_net
        external: false
        driver: bridge
        attachable: true
        enable_ipv6: false
        driver_opts:
          com.docker.network.bridge.name: br-internal
        ipam:
          driver: default
          config:
            - subnet: 172.30.0.0/16
              gateway: 172.30.0.1
    volumes:
      - tag: app_data
        external: false
        driver: local
        driver_opts:
          type: none
          o: bind
          device: /srv/data
        labels:
          env: production
    status:
      active: false
      rendered_config: null
