id: runtime-plugin
name: Runtime Plugin
version: 1.0.0
plugin_api_version: 1
description: Fixture plugin for runtime loader tests
entrypoint:
  module: fixture_plugin.main
  class: RuntimeFixturePlugin
capabilities:
  commands: true
  completion: true
  templates: true
  env_factories: true
  svc_factories: true
default_config:
  region: eu-west-1
env_templates:
  - tag: baseline
    factory: baseline-factory
    service_templates:
      - template: api
        tag: plugin-api
    probes: null
    networks: null
    volumes: null
env_template_fragments:
  - tag: db-bundle
    service_template:
      template: api
      tag: db
    probes:
      - tag: db-ready
        container:
          tag: db-probe
          image: busybox:stable-glibc
          networks: []
        script: "sh -c 'sleep 1'"
    volumes:
      - tag: db_data
        external: false
        driver: local
    networks: []

service_templates:
  - tag: api
    factory: api-factory
    labels: []
    properties:
      source: plugin
    containers:
      - image: busybox:stable-glibc
        tag: app
        container_name: null
        hostname: null
        workdir: null
        volumes: []
        environment: []
        ports: []
        networks: []
        extra_hosts: []
        inits: null
        build: null
    start: null
