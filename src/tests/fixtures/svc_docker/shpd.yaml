              context_path: "#{cfg.envs_path}/#{env.tag}/build"
              dockerfile_path: "#{cnt.build.context_path}/Dockerfile"
            tag: container-1
            workdir: /test
            volumes:
              - /home/test/.ssh:/home/test/.ssh
              - /etc/ssh:/etc/ssh
