              - POSTGRES_PASSWORD=psw
              - POSTGRES_USER=sys
              - POSTGRES_DB=docker
            ports:
              - 80:80
              - 443:443
              - 8080:8080
            networks:
              - default
            extra_hosts:
              - host.docker.internal:host-gateway
            inits: null
