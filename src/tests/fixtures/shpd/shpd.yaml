templates_path: ${templates_path}
envs_path: ${envs_path}
volumes_path: ${volumes_path}
staging_area:
  volumes_path: ${staging_area_volumes_path}
  images_path: ${staging_area_images_path}
env_templates:
  - tag: default
    factory: docker-compose
    service_templates:
      - template: default
        tag: service-default
    networks:
      - tag: shpdnet
        name: envnet
        external: true
service_templates:
  - tag: default
    factory: docker
    image: test-image:latest
    labels:
      - com.example.label1=value1
      - com.example.label2=value2
    workdir: /test
    volumes:
      - /home/test/.ssh:/home/test/.ssh
      - /etc/ssh:/etc/ssh
    environment: []
    ports:
      - 80:80
      - 443:443
      - 8080:8080
    properties: {}
    networks:
      - default
    extra_hosts:
      - host.docker.internal:host-gateway
    inits: null
envs:
  - template: default
    factory: docker-compose
    tag: test-1
    services:
      - template: default
        factory: docker
        tag: test
        containers:
          - image: test-image:latest
            tag: container-1
            workdir: /test
            volumes:
              - /home/test/.ssh:/home/test/.ssh
              - /etc/ssh:/etc/ssh
            environment: []
            ports:
              - 80:80
              - 443:443
              - 8080:8080
            networks:
              - default
            extra_hosts:
              - host.docker.internal:host-gateway
            inits: null
        labels:
          - com.example.label1=value1
          - com.example.label2=value2
        properties: {}
        status:
          active: true
          rendered_config: null
    probes:
      - tag: db-ready
        container:
          tag: db-ready
          image: postgres:17-3.5
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - "#{env.tag}"
          extra_hosts: []
          build: null
          inits: null
        script: sh -c 'pg_isready -h db -p 5432 -U sys -d docker'
        script_path: null
      - tag: db-live
        container:
          tag: db-live
          image: postgres:17-3.5
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - "#{env.tag}"
          extra_hosts: []
          build: null
          inits: null
        script: sh -c 'pg_isready -h db -p 5432 -U docker -d docker'
        script_path: null
    status:
      active: true
      rendered_config: null
