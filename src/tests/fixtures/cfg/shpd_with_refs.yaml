templates_path: ${templates_path}
envs_path: ${envs_path}
env_templates:
  - tag: nginx-postgres
    factory: docker-compose
    service_templates:
      - template: nginx
        tag: web
      - template: postgres
        tag: db
    probes: []
    networks:
      - tag: "#{env.tag}"
        name: "#{net.tag}"
        external: false
        driver: bridge
        attachable: null
        enable_ipv6: null
        driver_opts: null
        ipam: null
    volumes:
      - tag: nginx
        external: false
        name: null
        driver: local
        driver_opts:
          type: none
          o: bind
          device: "#{cfg.templates_path}/#{env.tag}/#{vol.tag}"
        labels:
          env: production
      - tag: postgres
        external: false
        name: null
        driver: local
        driver_opts:
          type: none
          o: bind
          device: "#{cfg.templates_path}/#{env.tag}/#{vol.tag}"
        labels:
          env: production
service_templates:
  - tag: nginx
    factory: docker
    start: null
    containers:
      - image: nginx:latest
        tag: nginx
        hostname: web-instance
        container_name: web-instance
        workdir: /usr/share/nginx/html
        volumes:
          - nginx:/usr/share/nginx/html
        environment:
          - NGINX_PORT=80
        ports:
          - 8080:80
        networks:
          - "#{env.tag}"
        extra_hosts: []
        build: null
        inits: null
    labels:
      - com.example.type=web
    properties: {}
  - tag: postgres
    factory: docker
    start: null
    containers:
      - image: postgres:14
        tag: postgres
        hostname: db-instance
        container_name: db-instance
        workdir: /var/lib/postgresql/data
        volumes:
          - postgres:/var/lib/postgresql/data
        environment:
          - POSTGRES_PASSWORD=secret
        ports:
          - 5432:5432
        networks:
          - "#{env.tag}"
        extra_hosts: []
        build: null
        inits: null
    labels:
      - com.example.type=db
    properties: {}
envs:
  - template: nginx-postgres
    factory: docker-compose
    tag: foo
    services:
      - template: nginx
        tag: web
        factory: docker
        start: null
        containers:
          - image: nginx:latest
            tag: nginx
            hostname: web-instance
            container_name: web-instance
            workdir: /usr/share/nginx/html
            volumes:
              - nginx:/usr/share/nginx/html
            environment:
              - NGINX_PORT=80
            ports:
              - 8080:80
            networks:
              - "#{env.tag}"
            extra_hosts: []
            build: null
            inits: null
        labels:
          - com.example.type=web
        service_class: "#{not.exist}"
        properties:
          com.example.type: "#{svc.tag}"
        upstreams: []
        status:
          active: true
          rendered_config: null
      - template: postgres
        upstreams: []
        start: null
        factory: docker
        tag: db
        service_class: "#{not.exist}"
        containers:
          - image: postgres:14
            tag: postgres
            hostname: db-instance
            container_name: db-instance
            workdir: /var/lib/postgresql/data
            volumes:
              - postgres:/var/lib/postgresql/data
            environment:
              - POSTGRES_PASSWORD=secret
            ports:
              - 5432:5432
            networks:
              - "#{env.tag}"
            extra_hosts: []
            build: null
            inits: null
        labels:
          - com.example.type=db
        properties:
          com.example.type: "#{svc.tag}"
        status:
          active: true
          rendered_config: null
    probes: []
    networks:
      - tag: "#{env.tag}"
        name: "#{net.tag}"
        external: false
        driver: bridge
        attachable: null
        enable_ipv6: null
        driver_opts: null
        ipam: null
    volumes:
      - tag: nginx
        external: false
        name: null
        driver: local
        driver_opts:
          type: none
          o: bind
          device: "#{cfg.templates_path}/#{env.tag}/#{vol.tag}"
        labels:
          env: production
      - tag: postgres
        external: false
        name: null
        driver: local
        driver_opts:
          type: none
          o: bind
          device: "#{cfg.templates_path}/#{env.tag}/#{vol.tag}"
        labels:
          env: production
    status:
      active: true
      rendered_config: null
