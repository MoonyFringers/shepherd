templates_path: ${templates_path}
envs_path: ${envs_path}
volumes_path: ${volumes_path}
staging_area:
  volumes_path: ${staging_area_volumes_path}
  images_path: ${staging_area_images_path}
plugins:
  - id: acme
    enabled: true
    version: 1.2.3
    config:
      region: eu-west-1
      enabled_feature: true
env_templates:
  - tag: default
    factory: docker-compose
    service_templates:
      - template: default
        tag: service-default
    probes: []
    networks:
      - tag: shpdnet
        name: envnet
        external: true
        driver: null
        attachable: null
        enable_ipv6: null
        driver_opts: null
        ipam: null
    volumes:
      - tag: app_data
        external: false
        name: null
        driver: local
        driver_opts:
          type: none
          o: bind
          device: ${volumes_path}/srv/data
        labels:
          env: production
service_templates:
  - tag: oracle
    factory: docker
    start: null
    containers:
      - image: ${ora_image}
        tag: container-ora
        hostname: ${ora_hostname}
        container_name: ${ora_container_name}
        workdir: null
        environment: []
        volumes:
          - app_data:/mnt/test
        ports:
          - 1521:${ora_listener_port}
        networks: []
        extra_hosts: []
        build: null
        inits: null
    labels: []
    properties:
      pump_dir_name: ${ora_pump_dir}
      root_db_name: ${ora_root_db_name}
      plug_db_name: ${ora_plug_db_name}
      sys_user: ${db_sys_usr}
      sys_psw: ${db_sys_psw}
      user: ${db_usr}
      psw: ${db_psw}
  - tag: postgres
    factory: docker
    start: null
    containers:
      - image: ${pg_image}
        tag: container-pg
        hostname: ${pg_hostname}
        container_name: ${pg_container_name}
        workdir: null
        environment: []
        volumes: []
        ports:
          - 5432:${pg_listener_port}
        networks: []
        extra_hosts: []
        build:
          context_path: "#{cfg.envs_path}/#{env.tag}/build"
          dockerfile_path: "#{cnt.build.context_path}/Dockerfile"
        inits: null
    labels: []
    properties:
      sys_user: ${db_sys_usr}
      sys_psw: ${db_sys_psw}
      user: ${db_usr}
      psw: ${db_psw}
envs:
  - template: default
    factory: docker-compose
    tag: sample-1
    services:
      - template: postgres
        factory: docker
        start: null
        containers:
          - image: ghcr.io/MoonyFringers/shepherd/postgres:17-3.5
            tag: container-pg
            hostname: null
            container_name: null
            workdir: null
            volumes: []
            environment: null
            ports: []
            networks: []
            extra_hosts: []
            build:
              context_path: "#{cfg.envs_path}/#{env.tag}/build"
              dockerfile_path: "#{cnt.build.context_path}/Dockerfile"
            inits: null
        tag: pg-1
        service_class: null
        labels: []
        properties:
          sys_user: syspg1
          sys_psw: syspg1
          user: pg1
          psw: pg1
        upstreams:
          - type: postgres
            tag: upstream-1
            enabled: true
            properties:
              user: pg1up
              psw: pg1up
              host: localhost
              port: "5432"
              database: d_pg1
              unix_user: postgres
              dump_dir: /dumps
          - type: postgres
            tag: upstream-2
            enabled: false
            properties:
              user: pg2up
              psw: pg2up
              host: moon
              port: "5432"
              database: d_pg2
              unix_user: postgres
              dump_dir: /dumps/2
        status:
          active: true
          rendered_config: null
      - template: traefik
        factory: docker
        tag: traefik-1
        service_class: null
        start: null
        containers:
          - image: ""
            tag: 1
            hostname: null
            container_name: null
            workdir: null
            volumes: []
            environment: null
            ports: []
            networks: []
            extra_hosts: []
            build: null
            inits: null
        labels: []
        properties: {}
        upstreams: []
        status:
          active: true
          rendered_config: null
      - template: custom-1
        factory: docker
        tag: primary
        service_class: null
        start: null
        containers:
          - image: ""
            tag: 1
            hostname: null
            container_name: null
            workdir: null
            volumes: []
            environment: null
            ports: []
            networks: []
            extra_hosts: []
            build: null
            inits: null
        labels: []
        properties:
          instance.name: primary
          instance.id: 1
        upstreams: []
        status:
          active: true
          rendered_config: null
      - template: nodejs
        factory: docker
        tag: poke
        service_class: null
        start: null
        containers:
          - image: ""
            build: null
            tag: 1
            hostname: null
            container_name: null
            workdir: null
            volumes: []
            environment:
              - USER=user
              - PSW=psw
            ports:
              - 3000:3000
            networks: []
            extra_hosts: []
            inits: null
        labels: []
        properties: {}
        upstreams: []
        status:
          active: true
          rendered_config: null
    probes: []
    networks:
      - tag: shpdnet
        name: envnet
        external: true
        driver: null
        attachable: null
        enable_ipv6: null
        driver_opts: null
        ipam: null
    volumes:
      - tag: app_data
        external: false
        name: null
        driver: local
        driver_opts:
          type: none
          o: bind
          device: /srv/data
        labels:
          env: production
    status:
      active: true
      rendered_config: null
