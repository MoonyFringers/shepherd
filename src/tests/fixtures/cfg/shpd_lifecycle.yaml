templates_path: ${templates_path}
envs_path: ${envs_path}
volumes_path: ${volumes_path}
staging_area:
  volumes_path: ${staging_area_volumes_path}
  images_path: ${staging_area_images_path}
env_templates:
  - tag: default
    factory: docker-compose
    service_templates:
      - template: default
        tag: service-default
    probes:
      - tag: created
        container:
          tag: created
          image: busybox:1.36
          hostname: null
          container_name: null
          workdir: null
          volumes:
            - postgres-data:/var/lib/postgresql/data
          environment: []
          ports: []
          networks: []
          extra_hosts: []
          build: null
        script: |
          sh -c '
            if [ -f /var/lib/postgresql/data/PG_VERSION ]; then
              exit 0;
            else
              exit 1;
            fi
          '
        script_path: null
      - tag: ready
        container:
          tag: ready
          image: ${pg_image}
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - "#{env.tag}"
          extra_hosts: []
          build: null
        script: "sh -c 'pg_isready -h db -p 5432 -U sys -d docker'"
        script_path: null
      - tag: live
        container: null
        script: null
        script_path: null
    networks:
      - tag: shpdnet
        name: envnet
        external: true
        driver: null
        attachable: null
        enable_ipv6: null
        driver_opts: null
        ipam: null
    volumes:
      - tag: app_data
        external: false
        name: null
        driver: local
        driver_opts:
          type: none
          o: bind
          device: ${volumes_path}/srv/data
        labels:
          env: production
service_templates:
  - tag: postgres
    factory: docker
    labels: []
    properties: {}
    containers:
      - tag: pg
        image: ${pg_image}
        hostname: db
        container_name: db
        workdir: null
        volumes:
          - postgres-data:/var/lib/postgresql/data
        environment:
          - POSTGRES_PASSWORD=test
          - POSTGRES_USER=sys
          - POSTGRES_DB=docker
        ports:
          - 5432:${pg_listener_port}
        networks:
          - "#{env.tag}"
        extra_hosts: []
        build: null
        inits:
          - tag: create-docker-user
            script: sh -c 'echo init ok'
            script_path: null
            when_probes:
              - ready
    start:
      when_probes:
        - sample-1-test-probe
envs:
  - template: default
    factory: docker-compose
    tag: sample-1
    services:
      - template: postgres
        factory: docker
        tag: db
        service_class: null
        labels: []
        properties: {}
        upstreams: []
        containers:
          - image: ghcr.io/MoonyFringers/shepherd/postgres:17-3.5
            tag: pg
            hostname: null
            container_name: null
            workdir: null
            volumes: []
            environment: null
            ports: []
            networks: []
            extra_hosts: []
            build: null
            inits: null
        start:
          when_probes:
            - sample-1-test-probe
        status:
          active: true
          rendered_config: null
    probes: []
    networks:
      - tag: shpdnet
        name: envnet
        external: true
        driver: null
        attachable: null
        enable_ipv6: null
        driver_opts: null
        ipam: null
    volumes: []
    status:
      active: true
      rendered_config: null
