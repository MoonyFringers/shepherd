templates_path: ${templates_path}
envs_path: ${envs_path}
volumes_path: ${volumes_path}
staging_area:
  volumes_path: ${staging_area_volumes_path}
  images_path: ${staging_area_images_path}
env_templates: []
service_templates: []
envs:
  - template: default
    factory: docker-compose
    tag: integ-redis-gated
    services:
      - tag: cache
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        upstreams: []
        containers:
          - tag: redis
            image: redis:7-alpine
            hostname: cache
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports: []
            networks:
              - default
            extra_hosts: []
            build: null
            inits: null
        start: null
        status:
          active: true
          rendered_config: null
      - tag: frontend
        factory: docker
        template: default
        service_class: null
        labels: []
        properties: {}
        upstreams: []
        containers:
          - tag: nginx
            image: nginx:1.27-alpine
            hostname: frontend
            container_name: null
            workdir: null
            volumes: []
            environment: []
            ports: []
            networks:
              - default
            extra_hosts: []
            build: null
            inits: null
        start:
          when_probes:
            - cache-ready
        status:
          active: true
          rendered_config: null
    probes:
      - tag: cache-ready
        container:
          tag: cache-ready
          image: redis:7-alpine
          hostname: null
          container_name: null
          workdir: null
          volumes: []
          environment: []
          ports: []
          networks:
            - default
          extra_hosts: []
          build: null
          inits: null
        script: "sh -lc 'redis-cli -h cache ping | grep -q PONG'"
        script_path: null
    networks:
      - tag: default
        name: null
        external: false
        driver: bridge
        attachable: true
        enable_ipv6: false
        driver_opts: null
        ipam: null
    volumes: []
    ready:
      when_probes:
        - cache-ready
    status:
      active: true
      rendered_config: null
