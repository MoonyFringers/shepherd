name: Codex Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout pull request merge commit
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Prepare Codex prompt
        run: |
          cat > codex-prompt.md <<'EOF'
          Review this pull request as a senior Python reviewer.

          Focus on:
          - correctness and regressions
          - security risks
          - edge cases and missing tests
          - backward compatibility

          Keep feedback concise and actionable.
          Return:
          1) a short summary
          2) a prioritized list of findings with severity and file references
          3) explicit "No major issues found" if there are no findings
          EOF

          {
            echo ""
            echo "Repository: ${{ github.repository }}"
            echo "PR: #${{ github.event.pull_request.number }}"
            echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
            echo "Head SHA: ${{ github.event.pull_request.head.sha }}"
            echo ""
            echo "Changed files:"
            git --no-pager diff --name-status \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}"
            echo ""
            echo "Unified diff (context=5):"
            git --no-pager diff --unified=5 \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}"
          } >> codex-prompt.md

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@main
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-prompt.md
          sandbox: read-only
          model: ${{ vars.CODEX_MODEL || 'gpt-5.2-codex' }}

      - name: Publish review comment
        if: ${{ always() && steps.codex.outputs.final-message != '' }}
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-automated-review -->';
            const body = `${marker}
            ## Codex Automated Review

            ${process.env.REVIEW_BODY}`;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
